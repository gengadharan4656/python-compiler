name: python_compiler
description: Python IDE for Android
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  path_provider: ^2.1.2
  google_fonts: ^6.1.0
  uuid: ^4.3.3
  intl: ^0.19.0
  file_picker: ^8.0.3
  share_plus: ^7.2.2
  archive: ^3.4.10
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/templates/
